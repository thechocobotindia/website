# TheChocoBot, Netlify build & headers

[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options       = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy       = "strict-origin-when-cross-origin"
    Permissions-Policy    = "camera=(), microphone=(), geolocation=()"

# Long-cache static assets (images, fonts, css, js are versioned by edit cycle)
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml"

# Custom domain hint, redundant with _redirects but explicit
[[redirects]]
  from = "https://thechocobot.com/*"
  to   = "https://www.thechocobot.com/:splat"
  status = 301
  force = true
